<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ゆるろん</title>
  <style>
    body {
      background-color: #FFFDEB;
      color: #333333;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    h1 {
      font-size: 42px;
      color: #FF477E;
      text-shadow: 3px 3px 0px #FFD166;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    .btn-container {
      margin: 20px;
    }

    button {
      background-color: #4EA8DE;
      color: #ffffff;
      border: 3px solid #333333;
      padding: 18px 35px;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 50px;
      margin: 0 15px;
      box-shadow: 0px 8px 0px #333333;
      transition: all 0.1s ease;
      outline: none;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0px 10px 0px #333333;
    }

    #response-area {
      margin-top: 20px;
      padding: 25px;
      border: 3px solid #333333;
      border-radius: 20px;
      width: 80%;
      max-width: 550px;
      min-height: 60px;
      text-align: center;
      background-color: #ffffff;
      box-shadow: 6px 6px 0px #FFD166;
      font-size: 20px;
      font-weight: bold;
    }

    #status-text {
      display: inline-block;
      padding: 5px 15px;
      border-radius: 10px;
    }

    /* 💬 ディベート画面のスタイル */
    #debate-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 90%;
      max-width: 500px;
      height: 70vh;
      border: 3px solid #333333;
      border-radius: 20px;
      background-color: #7593B1; /* LINEっぽい背景色に変えました */
      padding: 20px;
      box-shadow: 6px 6px 0px #333333;
    }

    /* LINE風のメッセージタイムライン */
    #chat-box {
      width: 100%;
      flex-grow: 1;
      overflow-y: auto;
      margin-bottom: 15px;
      padding: 10px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }

    /* ✨ 吹き出し全体のベース */
    .message-row {
      display: flex;
      width: 100%;
      margin: 8px 0;
    }

    /* 自分は右側、相手は左側 */
    .my-message { justify-content: flex-end; }
    .other-message { justify-content: flex-start; }

    /* ✨ LINE風のぷっくりとした吹き出しデザイン */
    .bubble {
      max-width: 70%;
      padding: 10px 15px;
      border-radius: 15px;
      font-size: 16px;
      font-weight: bold;
      line-height: 1.4;
      word-wrap: break-word;
      border: 2px solid #333333;
    }

    /* 自分の吹き出し：黄緑色 */
    .my-message .bubble {
      background-color: #85E245;
      color: #333333;
      border-radius: 15px 15px 0px 15px; /* 右下を尖らせる */
    }

    /* 相手の吹き出し：白色 */
    .other-message .bubble {
      background-color: #FFFFFF;
      color: #333333;
      border-radius: 15px 15px 15px 0px; /* 左下を尖らせる */
    }

    .chat-input-container {
      display: flex;
      width: 100%;
    }

    #message-input {
      flex-grow: 1;
      padding: 12px;
      font-size: 16px;
      border: 3px solid #333333;
      border-radius: 15px 0 0 15px;
      outline: none;
    }

    #send-btn {
      padding: 12px 25px;
      font-size: 16px;
      background-color: #FFD166;
      color: #333333;
      border: 3px solid #333333;
      border-left: none;
      border-radius: 0 15px 15px 0;
      cursor: pointer;
      font-weight: bold;
      margin: 0;
      box-shadow: none;
    }
  </style>
</head>
<body>

<h1 id="game-title">ゆるろん</h1>

<div id="menu-screen">
  <div class="btn-container">
    <button onclick="sendRequest('match')">MATCH</button>
  </div>
  <div id="response-area">
    STATUS : <span id="status-text" style="color: #FF9F1C; background-color: #FFEEDD;">READY</span>
  </div>
</div>

<div id="debate-screen">
  <div id="room-title" style="font-size: 18px; font-weight: bold; margin-bottom: 10px; color: #FFFFFF; text-shadow: 1px 1px 2px #333333;">
    部屋名: 接続中...
  </div>
  <div id="chat-box"></div>
  <div class="chat-input-container">
    <input type="text" id="message-input" placeholder="自分の意見を入力...">
    <button id="send-btn" onclick="sendMessage()">送信</button>
  </div>
</div>

<script>
  const SERVER_URL = 'https://dev-last-production.up.railway.app';
  let myRoomName = '';
  let myPlayerId = ''; // 自分が1人目(Player1)か2人目(Player2)か
  let lastMessageCount = 0; // すでに表示したメッセージの数

  function sendRequest(type) {
    const statusText = document.getElementById('status-text');
    statusText.innerText = 'CONNECTING...';

    fetch(`${SERVER_URL}/${type}`)
            .then(response => response.text())
            .then(data => {
              statusText.innerText = data;

              if (data.startsWith('MATCHING_SUCCESS')) {
                myRoomName = data.split(': ')[1]; // 部屋名を取得
                
                // 自分が1人目か2人目かを擬似的に決定
                myPlayerId = 'Player_' + Math.floor(Math.random() * 1000); 

                document.getElementById('room-title').innerText = `対戦部屋: ${myRoomName}`;
                
                setTimeout(() => {
                  document.getElementById('menu-screen').style.display = 'none';
                  document.getElementById('game-title').style.display = 'none'; // タイトルを隠して画面を広く
                  document.getElementById('debate-screen').style.display = 'flex';
                  
                  // 1秒ごとに相手のメッセージをサーバーへ見に行くタイマーをスタート
                  setInterval(updateChatLog, 1000);
                }, 1000);
              }
            });
  }

  // メッセージをサーバーに送る処理
  function sendMessage() {
    const input = document.getElementById('message-input');
    const text = input.value.trim();
    if (!text || !myRoomName) return;

    // サーバーに送信する
    fetch(`${SERVER_URL}/send-message`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        roomName: myRoomName,
        sender: myPlayerId,
        text: text
      })
    });

    input.value = '';
  }

  // サーバーからメッセージの最新状態を引っ張ってくる処理
  function updateChatLog() {
    if (!myRoomName) return;

    fetch(`${SERVER_URL}/get-messages?roomName=${myRoomName}`)
            .then(response => response.json())
            .then(messages => {
              // 新しいメッセージが増えていないなら何もしない
              if (messages.length === lastMessageCount) return;
              
              const chatBox = document.getElementById('chat-box');
              chatBox.innerHTML = ''; // 一旦クリアして綺麗に再描画

              messages.forEach(msg => {
                const rowElement = document.createElement('div');
                rowElement.classList.add('message-row');

                // 自分が送ったメッセージなら右側、相手なら左側
                if (msg.sender === myPlayerId) {
                  rowElement.classList.add('my-message');
                } else {
                  rowElement.classList.add('other-message');
                }

                const bubbleElement = document.createElement('div');
                bubbleElement.classList.add('bubble');
                bubbleElement.innerText = msg.text;

                rowElement.appendChild(bubbleElement);
                chatBox.appendChild(rowElement);
              });

              chatBox.scrollTop = chatBox.scrollHeight; // 自動スクロール
              lastMessageCount = messages.length; // カウントを更新
            });
  }
</script>

</body>
</html>
