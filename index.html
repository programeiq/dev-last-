<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ゆるろん</title>
  <style>
    body {
      background-color: #D6A2E8;
      color: #333333;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    #menu-screen {
      display: flex;
      position: relative;
      width: 90%;
      max-width: 800px;
      height: 450px;
      align-items: center;
      justify-content: space-between;
    }

    .btn-container {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 75%;
      width: 30%;
    }

    .menu-btn {
      color: #ffffff; border: 3px solid #333333; padding: 20px 0; font-size: 22px;
      font-weight: bold; cursor: pointer; border-radius: 15px; box-shadow: 0px 6px 0px #333333;
      transition: all 0.1s ease; outline: none; text-align: center; width: 100%;
    }
    .menu-btn:hover { transform: translateY(-2px); box-shadow: 0px 8px 0px #333333; }
    .menu-btn:active { transform: translateY(4px); box-shadow: 0px 2px 0px #333333; }

    .btn-play { background-color: #7BECB2; color: #333333; }
    .btn-ranking { background-color: #FFF385; color: #333333; }
    .btn-rule { background-color: #B2BEC3; color: #333333; }

    #response-area {
      width: 62%; height: 75%; border: 3px solid #333333; border-radius: 20px;
      background-color: #F5CD79; box-shadow: 6px 6px 0px #333333; padding: 25px;
      box-sizing: border-box; display: flex; flex-direction: column; align-items: center;
      justify-content: center; font-size: 20px; font-weight: bold; text-align: center;
      white-space: pre-wrap; position: relative;
    }

    /* ✨ 【自作アイコン対応】茶色のアイコン枠 */
    #user-icon-slot {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 100px;
      height: 100px;
      background-color: #CD853F; 
      border: 3px solid #333333;
      border-radius: 15px;
      box-shadow: 3px 3px 0px #333333;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden; /* 画像がはみ出さないようにマスク */
      transition: transform 0.1s;
    }
    #user-icon-slot:hover { transform: scale(1.05); }

    /* ✨ 自作したアイコン画像を表示するスタイル */
    #custom-icon-img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* 縦横比を維持して綺麗に収める */
    }

    #icon-item-label { 
      font-size: 11px; margin-top: 4px; color: #FFFFFF; font-weight: bold; 
      text-shadow: 1px 1px 0 #333333; background: rgba(0,0,0,0.5); padding: 2px 6px; 
      border-radius: 5px; max-width: 90px; overflow: hidden; text-overflow: ellipsis; 
      white-space: nowrap; position: absolute; bottom: 5px;
    }

    .btn-settings {
      position: absolute; top: 0; right: 0; background-color: #2D3436; color: white;
      border: 2px solid #111; width: 35px; height: 35px; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 16px; box-shadow: 0px 3px 0px #111; z-index: 10;
    }

    #header-area { display: flex; align-items: center; justify-content: space-between; width: 90%; max-width: 800px; margin-bottom: 10px; }
    h1 { font-size: 36px; color: #FFFFFF; text-shadow: 3px 3px 0px #333333; margin: 0; letter-spacing: 2px; }
    #user-badge { font-size: 14px; font-weight: bold; background-color: #FFFFFF; padding: 6px 15px; border-radius: 20px; border: 3px solid #333333; box-shadow: 3px 3px 0px #333333; }

    #debate-screen {
      display: none; flex-direction: column; align-items: center; width: 95%; max-width: 500px;
      height: 85vh; border: 3px solid #333333; border-radius: 20px; background-color: #7593B1; padding: 15px; box-shadow: 6px 6px 0px #333333; box-sizing: border-box;
    }

    #theme-info { width: 100%; background-color: #FF7096; border: 2px solid #333333; border-radius: 12px; padding: 8px; text-align: center; color: white; font-weight: bold; margin-bottom: 10px; box-sizing: border-box; }
    #hp-container { width: 100%; background-color: #333333; border: 2px solid #333333; border-radius: 10px; padding: 8px; margin-bottom: 10px; box-sizing: border-box; color: white; font-size: 12px; font-weight: bold; }
    .hp-bar-bg { width: 100%; background-color: #555555; height: 14px; border-radius: 7px; border: 1px solid #111; overflow: hidden; margin-top: 3px; }
    .hp-bar-fill { height: 100%; background-color: #06D6A0; width: 100%; transition: width 0.3s ease; }

    #chat-box { width: 100%; flex-grow: 1; overflow-y: auto; margin-bottom: 15px; padding: 10px; box-sizing: border-box; display: flex; flex-direction: column; }
    .message-row { display: flex; flex-direction: column; width: 100%; margin: 6px 0; }
    .my-message { align-items: flex-end; }
    .other-message { align-items: flex-start; }
    .sender-name { font-size: 12px; color: #EEEEEE; font-weight: bold; margin-bottom: 2px; text-shadow: 1px 1px 1px #333333; }

    .bubble { max-width: 75%; padding: 10px 15px; border-radius: 15px; font-size: 16px; font-weight: bold; line-height: 1.4; word-wrap: break-word; border: 2px solid #333333; }
    .my-message .bubble { background-color: #85E245; color: #333333; border-radius: 15px 15px 0px 15px; }
    .other-message .bubble { background-color: #FFFFFF; color: #333333; border-radius: 15px 15px 15px 0px; }
    
    .chat-input-container { display: flex; width: 100%; }
    #message-input { flex-grow: 1; padding: 12px; font-size: 16px; border: 3px solid #333333; border-radius: 15px 0 0 15px; outline: none; }
    #send-btn { padding: 12px 25px; font-size: 16px; background-color: #FFD166; color: #333333; border: 3px solid #333333; border-left: none; border-radius: 0 15px 15px 0; cursor: pointer; font-weight: bold; margin: 0; }
    #send-btn:disabled { background-color: #AAAAAA; cursor: not-allowed; }
    .btn-back { padding: 6px 15px; font-size: 14px; background-color: #FF477E; box-shadow: 0px 4px 0px #333333; border-radius: 20px; margin: 0; border: 2px solid #333333; color: white; font-weight: bold; cursor: pointer;}
  </style>
</head>
<body>

<div id="header-container" style="width: 100%; display: flex; justify-content: center;">
  <div id="header-area">
    <h1 id="game-title">ゆるろん</h1>
    <div id="user-badge">プレイヤー: 読み込み中...</div>
  </div>
</div>

<div id="menu-screen">
  <button class="btn-settings" onclick="changeName()" title="名前を変更する">⚙️</button>

  <div class="btn-container">
    <button class="menu-btn btn-play" onclick="sendRequest('match')">PLAY</button>
    <button class="menu-btn btn-ranking" onclick="sendRequest('ranking')">RANKING</button>
    <button class="menu-btn btn-rule" onclick="showRule()">RULE</button>
  </div>
  
  <div id="response-area">
    <div id="user-icon-slot" onclick="openItemBox()" title="称号アイテムを変更する">
      <img id="custom-icon-img" src="icon.png" onerror="this.style.display='none'; document.getElementById('fallback-emoji').style.display='block';">
      <span id="fallback-emoji" style="display:none; font-size: 40px;">🐣</span>
      <span id="icon-item-label">初心者</span>
    </div>

    <div id="display-box" style="margin-top: 40px;">STATUS : <span style="color: #2D3436;">READY</span></div>
  </div>
</div>

<div id="debate-screen">
  <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 10px;">
    <div id="room-title" style="font-size: 14px; font-weight: bold; color: #FFFFFF;">部屋名: 接続中...</div>
    <button class="btn-back" onclick="goBackToMenu()">戻る</button>
  </div>

  <div id="theme-info">
    <div id="current-theme" style="font-size: 18px;">お題: 読み込み中...</div>
    <div id="timer-text" style="font-size: 14px; margin-top: 4px; color: #FFF385;">残り秒数: 180秒</div>
  </div>

  <div id="hp-container">
    <div style="display: flex; justify-content: space-between;">
      <div style="width: 46%;">
        <div id="my-hp-label">あなた: 100</div>
        <div class="hp-bar-bg"><div id="my-hp-bar" class="hp-bar-fill"></div></div>
      </div>
      <div style="font-size: 16px; display: flex; align-items: center; color: #FFF385;">VS</div>
      <div style="width: 46%; text-align: right;">
        <div id="enemy-hp-label">相手: 100</div>
        <div class="hp-bar-bg"><div id="enemy-hp-bar" class="hp-bar-fill"></div></div>
      </div>
    </div>
  </div>

  <div id="chat-box"></div>
  <div class="chat-input-container">
    <input type="text" id="message-input" placeholder="自分の意見を入力...">
    <button id="send-btn" onclick="sendMessage()">送信</button>
  </div>
</div>

<script>
  const SERVER_URL = 'https://dev-last-production.up.railway.app';
  let myRoomName = '';
  let lastMessageCount = 0; 
  let chatIntervalId = null;
  let timerIntervalId = null; 
  let remainingTime = 180; 
  let isGameOverFlag = false;

  let myUsername = localStorage.getItem('yururon_username') || '';
  let myLevel = parseInt(localStorage.getItem('yururon_level')) || 1;
  let myExp = parseInt(localStorage.getItem('yururon_exp')) || 0;
  let currentLabel = localStorage.getItem('yururon_label') || 'ゆるろん初心者';

  // ✨ 【レベル100上限対応】称号アイテムの解放ロードマップ
  const itemsList = [
    { lv: 1, label: '🥚 ゆるろん初心者' },
    { lv: 10, label: '🐣 口喧嘩のヒヨコ' },
    { lv: 30, label: '🐓 論破のニワトリ' },
    { lv: 50, label: '🔥 弁論大会の覇者' },
    { lv: 80, label: '👑 論理の絶対神' },
    { lv: 100, label: '🐉 伝説のディベーター' }
  ];

  if (!myUsername) {
    myUsername = prompt('ユーザーネームを入力してください！') || '名無しさん';
    localStorage.setItem('yururon_username', myUsername);
  }
  
  function updateUserDataDisplay() {
    // ✨ レベル100に達したら「MAX」と表示する
    let lvText = myLevel >= 100 ? "MAX" : `Lv.${myLevel}`;
    let expText = myLevel >= 100 ? "MAX" : `EXP: ${myExp}/100`;
    
    document.getElementById('user-badge').innerText = `${myUsername} [${lvText} (${expText})]`;
    document.getElementById('icon-item-label').innerText = currentLabel;
  }

  updateUserDataDisplay();

  function changeName() {
    let newName = prompt('新しいユーザーネームを入力してください：', myUsername);
    if (newName && newName.trim() !== '') {
      myUsername = newName;
      localStorage.setItem('yururon_username', myUsername);
      updateUserDataDisplay();
    }
  }

  function openItemBox() {
    let message = "👕 称号着せ替えクローゼット 👕\nレベルに応じて以下のアイテム（称号）を選べます。変更したい番号を半角数字で入力してね！\n\n";
    
    itemsList.forEach((item, index) => {
      const isUnlocked = myLevel >= item.lv;
      message += `${index + 1}: [${isUnlocked ? '🔓解放済' : '🔒Lv.' + item.lv + 'で解放'}] ${item.label}\n`;
    });

    let choice = prompt(message);
    let idx = parseInt(choice) - 1;

    if (idx >= 0 && idx < itemsList.length) {
      if (myLevel >= itemsList[idx].lv) {
        currentLabel = itemsList[idx].label;
        localStorage.setItem('yururon_label', currentLabel);
        updateUserDataDisplay();
        document.getElementById('display-box').innerText = `称号を「${currentLabel}」に変更したよ！`;
      } else {
        alert("🔒 その称号はレベルが足りないためまだロックされています！もっと戦おう！");
      }
    }
  }

  // ✨ 【新機能】上限100までの経験値加算処理
  function addExperience(amount) {
    if (myLevel >= 100) {
      document.getElementById('display-box').innerText = `🎉 戦闘終了！すでにレベルMAX（Lv.100）です！最強！`;
      return; 
    }

    myExp += amount;
    let leveledUp = false;
    
    while (myExp >= 100 && myLevel < 100) {
      myExp -= 100;
      myLevel++;
      leveledUp = true;
      
      // レベル100に達したら残りのEXPを0にする（カンスト）
      if (myLevel >= 100) {
        myExp = 0;
        break;
      }
    }

    localStorage.setItem('yururon_level', myLevel);
    localStorage.setItem('yururon_exp', myExp);
    updateUserDataDisplay();

    let rewardText = `🎉 戦闘終了！ ${amount} EXP を獲得したよ！`;
    if (leveledUp) {
      rewardText += `\n🌟🌟 レベルアップ！！！ Lv.${myLevel} になりました！ 🌟🌟`;
      if (myLevel === 100) {
        rewardText += `\n👑 ついにレベル上限の【Lv.100】に到達しました！最強の称号「伝説のディベーター」が解放されたぞ！`;
      }
    }
    document.getElementById('display-box').innerText = rewardText;
  }

  function showRule() {
    document.getElementById('display-box').innerHTML = `【ゆるろんのルール説明】\n\n🟢 PLAYを押すとマッチングが始まるよ！\n🧠 お題が決まったら3分間のディベート開始！\n🥊 送信した「文字の数」だけ相手の体力を削れるぞ！\n💀 相手のHPを0にするとK.O.勝利！\n🟤 試合終了でEXP獲得！最高レベル100を目指そう！`;
  }

  function sendRequest(type) {
    const displayBox = document.getElementById('display-box');
    if (type === 'match') { displayBox.innerHTML = 'STATUS : <span style="color: #2D3436;">CONNECTING...</span>'; }

    fetch(`${SERVER_URL}/${type}`)
            .then(response => response.text())
            .then(data => {
              if (type === 'ranking') {
                displayBox.innerHTML = `🏆 ランキング 🏆\n\n${data}`;
                return;
              }

              if (data.startsWith('MATCHING_SUCCESS')) {
                const parts = data.split(' | ');
                myRoomName = parts[0].split(': ')[1]; 
                const currentTheme = parts[1]; 

                document.getElementById('room-title').innerText = `対戦部屋: ${myRoomName}`;
                document.getElementById('current-theme').innerText = `お題：${currentTheme}`;
                
                document.getElementById('my-hp-label').innerText = `${myUsername}: 100`;
                document.getElementById('enemy-hp-label').innerText = `相手: 100`;
                document.getElementById('my-hp-bar').style.width = '100%';
                document.getElementById('enemy-hp-bar').style.width = '100%';
                isGameOverFlag = false;

                setTimeout(() => {
                  document.getElementById('menu-screen').style.display = 'none';
                  document.getElementById('header-container').style.display = 'none'; 
                  document.getElementById('debate-screen').style.display = 'flex';
                  
                  chatIntervalId = setInterval(updateChatLog, 1000);
                  startTimer(); 
                }, 1000);
              }
            });
  }

  function startTimer() {
    remainingTime = 180; 
    document.getElementById('timer-text').innerText = `残り秒数: ${remainingTime}秒`;
    document.getElementById('timer-text').style.color = '#FFF385';
    document.getElementById('message-input').disabled = false;
    document.getElementById('send-btn').disabled = false;

    timerIntervalId = setInterval(() => {
      if (isGameOverFlag) return;
      remainingTime--;
      if (remainingTime <= 0) {
        endGame("⏱️ タイムアップ！引き分け！", 20); 
      } else {
        document.getElementById('timer-text').innerText = `残り秒数: ${remainingTime}秒`;
        if (remainingTime <= 15) { document.getElementById('timer-text').style.color = '#FF477E'; }
      }
    }, 1000);
  }

  function sendMessage() {
    const input = document.getElementById('message-input');
    const text = input.value.trim();
    if (!text || !myRoomName || remainingTime <= 0 || isGameOverFlag) return; 

    fetch(`${SERVER_URL}/send-message`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ roomName: myRoomName, sender: myUsername, text: text })
    });
    input.value = '';
  }

  function updateChatLog() {
    if (!myRoomName) return;
    fetch(`${SERVER_URL}/get-messages?roomName=${myRoomName}`)
            .then(response => response.json())
            .then(data => {
              const messages = data.messages;
              const hpData = data.hpData;

              let myHP = 100;
              let enemyHP = 100;
              let enemyName = "相手";

              Object.keys(hpData).forEach(player => {
                if (player === myUsername) { myHP = hpData[player]; } 
                else { enemyName = player; enemyHP = hpData[player]; }
              });

              document.getElementById('my-hp-label').innerText = `${myUsername}: ${myHP}`;
              document.getElementById('enemy-hp-label').innerText = `${enemyName}: ${enemyHP}`;
              document.getElementById('my-hp-bar').style.width = `${myHP}%`;
              document.getElementById('enemy-hp-bar').style.width = `${enemyHP}%`;

              document.getElementById('my-hp-bar').style.backgroundColor = myHP <= 30 ? '#FF477E' : '#06D6A0';
              document.getElementById('enemy-hp-bar').style.backgroundColor = enemyHP <= 30 ? '#FF477E' : '#06D6A0';

              if (!isGameOverFlag) {
                if (myHP <= 0 && enemyHP <= 0) { endGame("💥 相打ち！ダブルK.O.！", 20); } 
                else if (myHP <= 0) { endGame(`💀 K.O.！ ${enemyName} の勝ち！`, 20); } 
                else if (enemyHP <= 0) { endGame(`🏆 K.O.！ ${myUsername} の勝ち！`, 50); } 
              }

              if (messages.length === lastMessageCount) return;
              const chatBox = document.getElementById('chat-box');
              chatBox.innerHTML = ''; 

              messages.forEach(msg => {
                const rowElement = document.createElement('div');
                rowElement.classList.add('message-row');
                if (msg.sender === myUsername) { rowElement.classList.add('my-message'); } 
                else { rowElement.classList.add('other-message'); }

                const nameElement = document.createElement('div');
                nameElement.classList.add('sender-name');
                nameElement.innerText = msg.sender;

                const bubbleElement = document.createElement('div');
                bubbleElement.classList.add('bubble');
                bubbleElement.innerText = msg.text;

                rowElement.appendChild(nameElement);
                rowElement.appendChild(bubbleElement);
                chatBox.appendChild(rowElement);
              });
              chatBox.scrollTop = chatBox.scrollHeight; 
              lastMessageCount = messages.length; 
            });
  }

  function endGame(resultMessage, expReward) {
    isGameOverFlag = true;
    clearInterval(timerIntervalId);
    document.getElementById('timer-text').innerText = resultMessage;
    document.getElementById('timer-text').style.color = '#FFF385';
    document.getElementById('message-input').disabled = true;
    document.getElementById('send-btn').disabled = true;

    fetch(`${SERVER_URL}/game-over`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ roomName: myRoomName })
    });

    localStorage.setItem('yururon_pending_exp', expReward);
  }

  function goBackToMenu() {
    if (chatIntervalId) { clearInterval(chatIntervalId); }
    if (timerIntervalId) { clearInterval(timerIntervalId); } 
    myRoomName = '';
    lastMessageCount = 0;
    document.getElementById('chat-box').innerHTML = '';

    document.getElementById('debate-screen').style.display = 'none';
    document.getElementById('header-container').style.display = 'flex';
    document.getElementById('game-title').style.display = 'block';
    document.getElementById('menu-screen').style.display = 'flex';
    document.getElementById('display-box').innerHTML = 'STATUS : <span style="color: #2D3436;">READY</span>';

    let pendingExp = localStorage.getItem('yururon_pending_exp');
    if (pendingExp) {
      addExperience(parseInt(pendingExp));
      localStorage.removeItem('yururon_pending_exp');
    }
  }
</script>

</body>
</html>
