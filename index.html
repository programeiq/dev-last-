<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ゆるろん</title>
  <style>
    body {
      background-color: #FFFDEB;
      color: #333333;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    h1 {
      font-size: 42px;
      color: #FF477E;
      text-shadow: 3px 3px 0px #FFD166;
      margin: 0 0 20px 0;
      letter-spacing: 2px;
    }

    #user-badge {
      font-size: 16px;
      font-weight: bold;
      background-color: #FFD166;
      padding: 5px 15px;
      border-radius: 20px;
      border: 2px solid #333333;
      margin-bottom: 10px;
    }

    .btn-container { margin: 20px; }

    button {
      background-color: #4EA8DE; color: #ffffff; border: 3px solid #333333;
      padding: 18px 35px; font-size: 22px; font-weight: bold; cursor: pointer;
      border-radius: 50px; margin: 0 15px; box-shadow: 0px 8px 0px #333333;
      transition: all 0.1s ease; outline: none;
    }

    .btn-ranking { background-color: #06D6A0; }
    button:hover { transform: translateY(-2px); box-shadow: 0px 10px 0px #333333; }
    button:active { transform: translateY(6px); box-shadow: 0px 2px 0px #333333; }

    #response-area {
      margin-top: 20px; padding: 25px; border: 3px solid #333333; border-radius: 20px;
      width: 80%; max-width: 550px; min-height: 60px; text-align: center;
      background-color: #ffffff; box-shadow: 6px 6px 0px #FFD166; font-size: 20px;
      font-weight: bold; white-space: pre-wrap;
    }

    #menu-screen { display: flex; flex-direction: column; align-items: center; width: 100%; }

    #debate-screen {
      display: none; flex-direction: column; align-items: center;
      width: 90%; max-width: 500px; height: 82vh; /* 体力バー追加に伴い縦幅を少し拡大 */
      border: 3px solid #333333; border-radius: 20px;
      background-color: #7593B1; padding: 15px; box-shadow: 6px 6px 0px #333333;
      box-sizing: border-box;
    }

    #theme-info {
      width: 100%; background-color: #FF7096; border: 2px solid #333333;
      border-radius: 12px; padding: 8px; text-align: center; color: white;
      font-weight: bold; margin-bottom: 10px; box-sizing: border-box;
    }

    /* ✨ 【新機能】格闘ゲーム風の体力メーターコンテナ */
    #hp-container {
      width: 100%; background-color: #333333; border: 2px solid #333333;
      border-radius: 10px; padding: 8px; margin-bottom: 10px;
      box-sizing: border-box; color: white; font-size: 12px; font-weight: bold;
    }

    .hp-bar-bg {
      width: 100%; background-color: #555555; height: 14px;
      border-radius: 7px; border: 1px solid #111; overflow: hidden; margin-top: 3px;
    }

    .hp-bar-fill {
      height: 100%; background-color: #06D6A0; width: 100%;
      transition: width 0.3s ease; /* ダメージを受けた時に滑らかに減るアニメーション */
    }

    #chat-box {
      width: 100%; flex-grow: 1; overflow-y: auto; margin-bottom: 15px;
      padding: 10px; box-sizing: border-box; display: flex; flex-direction: column;
    }

    .message-row { display: flex; flex-direction: column; width: 100%; margin: 6px 0; }
    .my-message { align-items: flex-end; }
    .other-message { align-items: flex-start; }
    .sender-name { font-size: 12px; color: #EEEEEE; font-weight: bold; margin-bottom: 2px; text-shadow: 1px 1px 1px #333333; }

    .bubble {
      max-width: 75%; padding: 10px 15px; border-radius: 15px; font-size: 16px;
      font-weight: bold; line-height: 1.4; word-wrap: break-word; border: 2px solid #333333;
    }

    .my-message .bubble { background-color: #85E245; color: #333333; border-radius: 15px 15px 0px 15px; }
    .other-message .bubble { background-color: #FFFFFF; color: #333333; border-radius: 15px 15px 15px 0px; }
    .chat-input-container { display: flex; width: 100%; }

    #message-input {
      flex-grow: 1; padding: 12px; font-size: 16px; border: 3px solid #333333;
      border-radius: 15px 0 0 15px; outline: none;
    }

    #send-btn {
      padding: 12px 25px; font-size: 16px; background-color: #FFD166;
      color: #333333; border: 3px solid #333333; border-left: none;
      border-radius: 0 15px 15px 0; cursor: pointer; font-weight: bold; margin: 0;
    }

    #send-btn:disabled { background-color: #AAAAAA; cursor: not-allowed; }
    .btn-back { padding: 6px 15px; font-size: 14px; background-color: #FF477E; box-shadow: 0px 4px 0px #333333; border-radius: 20px; margin: 0; }
  </style>
</head>
<body>

<h1 id="game-title">ゆるろん</h1>
<div id="user-badge">プレイヤー: 読み込み中...</div>

<div id="menu-screen">
  <div class="btn-container">
    <button onclick="sendRequest('match')">MATCH</button>
    <button class="btn-ranking" onclick="sendRequest('ranking')">RANKING</button>
  </div>
  <div id="response-area">
    <span id="display-box">STATUS : <span id="status-text" style="color: #FF9F1C; background-color: #FFEEDD;">READY</span></span>
  </div>
</div>

<div id="debate-screen">
  <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 10px;">
    <div id="room-title" style="font-size: 14px; font-weight: bold; color: #FFFFFF;">部屋名: 接続中...</div>
    <button class="btn-back" onclick="goBackToMenu()">戻る</button>
  </div>

  <div id="theme-info">
    <div id="current-theme" style="font-size: 18px;">お題: 読み込み中...</div>
    <div id="timer-text" style="font-size: 14px; margin-top: 4px; color: #FFD166;">残り秒数: 180秒</div>
  </div>

  <div id="hp-container">
    <div style="display: flex; justify-content: space-between;">
      <div style="width: 46%;">
        <div id="my-hp-label">あなた: 100</div>
        <div class="hp-bar-bg"><div id="my-hp-bar" class="hp-bar-fill"></div></div>
      </div>
      <div style="font-size: 16px; display: flex; align-items: center; color: #FFD166;">VS</div>
      <div style="width: 46%; text-align: right;">
        <div id="enemy-hp-label">相手: 100</div>
        <div class="hp-bar-bg"><div id="enemy-hp-bar" class="hp-bar-fill"></div></div>
      </div>
    </div>
  </div>

  <div id="chat-box"></div>
  <div class="chat-input-container">
    <input type="text" id="message-input" placeholder="自分の意見を入力...">
    <button id="send-btn" onclick="sendMessage()">送信</button>
  </div>
</div>

<script>
  const SERVER_URL = 'https://dev-last-production.up.railway.app';
  let myRoomName = '';
  let lastMessageCount = 0; 
  let chatIntervalId = null;
  let timerIntervalId = null; 
  let remainingTime = 180; 
  let isGameOverFlag = false; // 決着がついたかどうかのフラグ

  let myUsername = localStorage.getItem('yururon_username');
  if (!myUsername) {
    myUsername = prompt('ユーザーネームを入力してください！');
    if (!myUsername || myUsername.trim() === '') { myUsername = '名無しさん'; }
    localStorage.setItem('yururon_username', myUsername);
  }
  document.getElementById('user-badge').innerText = `プレイヤー: ${myUsername}`;

  function sendRequest(type) {
    const displayBox = document.getElementById('display-box');
    if (type === 'match') {
      displayBox.innerHTML = 'STATUS : <span id="status-text" style="color: #4EA8DE; background-color: #E2F0CB;">CONNECTING...</span>';
    }

    fetch(`${SERVER_URL}/${type}`)
            .then(response => response.text())
            .then(data => {
              if (type === 'ranking') {
                displayBox.innerHTML = data;
                return;
              }

              const statusText = document.getElementById('status-text');
              if (statusText) { statusText.innerText = data; }

              if (data.startsWith('MATCHING_SUCCESS')) {
                const parts = data.split(' | ');
                myRoomName = parts[0].split(': ')[1]; 
                const currentTheme = parts[1]; 

                document.getElementById('room-title').innerText = `対戦部屋: ${myRoomName}`;
                document.getElementById('current-theme').innerText = `お題：${currentTheme}`;
                
                // 体力表記の初期化
                document.getElementById('my-hp-label').innerText = `${myUsername}: 100`;
                document.getElementById('enemy-hp-label').innerText = `相手: 100`;
                document.getElementById('my-hp-bar').style.width = '100%';
                document.getElementById('enemy-hp-bar').style.width = '100%';
                isGameOverFlag = false;

                setTimeout(() => {
                  document.getElementById('menu-screen').style.display = 'none';
                  document.getElementById('game-title').style.display = 'none'; 
                  document.getElementById('debate-screen').style.display = 'flex';
                  
                  chatIntervalId = setInterval(updateChatLog, 1000);
                  startTimer(); 
                }, 1000);
              }
            });
  }

  function startTimer() {
    remainingTime = 180; 
    document.getElementById('timer-text').innerText = `残り秒数: ${remainingTime}秒`;
    document.getElementById('timer-text').style.color = '#FFD166';
    document.getElementById('message-input').disabled = false;
    document.getElementById('send-btn').disabled = false;

    timerIntervalId = setInterval(() => {
      if (isGameOverFlag) return; // K.O.終了してたらカウントしない

      remainingTime--;
      if (remainingTime <= 0) {
        endGame("⏱️ タイムアップ！引き分け！");
      } else {
        document.getElementById('timer-text').innerText = `残り秒数: ${remainingTime}秒`;
        if (remainingTime <= 15) { document.getElementById('timer-text').style.color = '#FF477E'; }
      }
    }, 1000);
  }

  function sendMessage() {
    const input = document.getElementById('message-input');
    const text = input.value.trim();
    if (!text || !myRoomName || remainingTime <= 0 || isGameOverFlag) return; 

    // 自分のHP情報をサーバーに認識させるために、最初の発言時に一度空データを送る対策も兼ねる
    fetch(`${SERVER_URL}/send-message`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ roomName: myRoomName, sender: myUsername, text: text })
    });
    input.value = '';
  }

  function updateChatLog() {
    if (!myRoomName) return;
    fetch(`${SERVER_URL}/get-messages?roomName=${myRoomName}`)
            .then(response => response.json())
            .then(data => {
              const messages = data.messages;
              const hpData = data.hpData;

              // ✨ 【新機能】HPバーのリアルタイム更新処理
              let myHP = 100;
              let enemyHP = 100;
              let enemyName = "相手";

              // サーバーから届いたHPデータを解析
              Object.keys(hpData).forEach(player => {
                if (player === myUsername) {
                  myHP = hpData[player];
                } else {
                  enemyName = player;
                  enemyHP = hpData[player];
                }
              });

              // 画面のHPバーを縮める
              document.getElementById('my-hp-label').innerText = `${myUsername}: ${myHP}`;
              document.getElementById('enemy-hp-label').innerText = `${enemyName}: ${enemyHP}`;
              document.getElementById('my-hp-bar').style.width = `${myHP}%`;
              document.getElementById('enemy-hp-bar').style.width = `${enemyHP}%`;

              // HPバーの色変化（ピンチで赤くする）
              document.getElementById('my-hp-bar').style.backgroundColor = myHP <= 30 ? '#FF477E' : '#06D6A0';
              document.getElementById('enemy-hp-bar').style.backgroundColor = enemyHP <= 30 ? '#FF477E' : '#06D6A0';

              // ✨ 【新機能】どちらかのHPが0になったらK.O.判定
              if (!isGameOverFlag) {
                if (myHP <= 0 && enemyHP <= 0) {
                  endGame("💥 相打ち！ダブルK.O.！");
                } else if (myHP <= 0) {
                  endGame(`💀 K.O.！ ${enemyName} の勝ち！`);
                } else if (enemyHP <= 0) {
                  endGame(`🏆 K.O.！ ${myUsername} の勝ち！`);
                }
              }

              // チャットメッセージの更新表示
              if (messages.length === lastMessageCount) return;
              const chatBox = document.getElementById('chat-box');
              chatBox.innerHTML = ''; 

              messages.forEach(msg => {
                const rowElement = document.createElement('div');
                rowElement.classList.add('message-row');
                if (msg.sender === myUsername) { rowElement.classList.add('my-message'); } 
                else { rowElement.classList.add('other-message'); }

                const nameElement = document.createElement('div');
                nameElement.classList.add('sender-name');
                nameElement.innerText = msg.sender;

                const bubbleElement = document.createElement('div');
                bubbleElement.classList.add('bubble');
                bubbleElement.innerText = msg.text;

                rowElement.appendChild(nameElement);
                rowElement.appendChild(bubbleElement);
                chatBox.appendChild(rowElement);
              });
              chatBox.scrollTop = chatBox.scrollHeight; 
              lastMessageCount = messages.length; 
            });
  }

  // ✨ 【新機能】ゲーム終了時の共通ロック処理
  function endGame(resultMessage) {
    isGameOverFlag = true;
    clearInterval(timerIntervalId);
    document.getElementById('timer-text').innerText = resultMessage;
    document.getElementById('timer-text').style.color = '#FFD166';
    document.getElementById('message-input').disabled = true;
    document.getElementById('send-btn').disabled = true;

    // サーバーにも終了を伝える
    fetch(`${SERVER_URL}/game-over`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ roomName: myRoomName })
    });
  }

  function goBackToMenu() {
    if (chatIntervalId) { clearInterval(chatIntervalId); }
    if (timerIntervalId) { clearInterval(timerIntervalId); } 
    myRoomName = '';
    lastMessageCount = 0;
    document.getElementById('chat-box').innerHTML = '';

    document.getElementById('debate-screen').style.display = 'none';
    document.getElementById('game-title').style.display = 'block';
    document.getElementById('menu-screen').style.display = 'flex';
    document.getElementById('display-box').innerHTML = 'STATUS : <span id="status-text" style="color: #FF9F1C; background-color: #FFEEDD;">READY</span>';
  }
</script>

</body>
</html>
