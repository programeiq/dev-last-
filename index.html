<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ゆるろん</title>
  <style>
    /* 全体の背景：明るくポップなクリームイエロー */
    body {
      background-color: #FFFDEB;
      color: #333333;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    /* タイトル：ネオンピンクで太くて元気な文字 */
    h1 {
      font-size: 42px;
      color: #FF477E;
      text-shadow: 3px 3px 0px #FFD166;
      margin: 0 0 20px 0;
      letter-spacing: 2px;
    }

    /* ログイン中のユーザー名表示スタイル */
    #user-badge {
      font-size: 16px;
      font-weight: bold;
      background-color: #FFD166;
      padding: 5px 15px;
      border-radius: 20px;
      border: 2px solid #333333;
      margin-bottom: 10px;
    }

    .btn-container {
      margin: 20px;
    }

    /* ボタン：ぷっくり立体的でアメコミ風のデザイン */
    button {
      background-color: #4EA8DE;
      color: #ffffff;
      border: 3px solid #333333;
      padding: 18px 35px;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 50px;
      margin: 0 15px;
      box-shadow: 0px 8px 0px #333333;
      transition: all 0.1s ease;
      outline: none;
    }

    /* RANKINGボタンはミントグリーン */
    .btn-ranking {
      background-color: #06D6A0;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0px 10px 0px #333333;
    }

    button:active {
      transform: translateY(6px);
      box-shadow: 0px 2px 0px #333333;
    }

    /* レスポンスエリア */
    #response-area {
      margin-top: 20px;
      padding: 25px;
      border: 3px solid #333333;
      border-radius: 20px;
      width: 80%;
      max-width: 550px;
      min-height: 60px;
      text-align: center;
      background-color: #ffffff;
      box-shadow: 6px 6px 0px #FFD166;
      font-size: 20px;
      font-weight: bold;
      white-space: pre-wrap;
    }

    #status-text {
      display: inline-block;
      padding: 5px 15px;
      border-radius: 10px;
    }

    /* メインメニューのコンテナ */
    #menu-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* LINE風ディベート画面のスタイル */
    #debate-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 90%;
      max-width: 500px;
      height: 75vh;
      border: 3px solid #333333;
      border-radius: 20px;
      background-color: #7593B1;
      padding: 15px;
      box-shadow: 6px 6px 0px #333333;
      box-sizing: border-box;
    }

    /* チャット表示エリア */
    #chat-box {
      width: 100%;
      flex-grow: 1;
      overflow-y: auto;
      margin-bottom: 15px;
      padding: 10px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }

    .message-row {
      display: flex;
      flex-direction: column; /* 名前と吹き出しを縦に並べる */
      width: 100%;
      margin: 6px 0;
    }

    .my-message { align-items: flex-end; }
    .other-message { align-items: flex-start; }

    /* 吹き出しの上の名前ラベル */
    .sender-name {
      font-size: 12px;
      color: #EEEEEE;
      font-weight: bold;
      margin-bottom: 2px;
      text-shadow: 1px 1px 1px #333333;
    }

    .bubble {
      max-width: 75%;
      padding: 10px 15px;
      border-radius: 15px;
      font-size: 16px;
      font-weight: bold;
      line-height: 1.4;
      word-wrap: break-word;
      border: 2px solid #333333;
    }

    .my-message .bubble {
      background-color: #85E245;
      color: #333333;
      border-radius: 15px 15px 0px 15px;
    }

    .other-message .bubble {
      background-color: #FFFFFF;
      color: #333333;
      border-radius: 15px 15px 15px 0px;
    }

    .chat-input-container {
      display: flex;
      width: 100%;
    }

    #message-input {
      flex-grow: 1;
      padding: 12px;
      font-size: 16px;
      border: 3px solid #333333;
      border-radius: 15px 0 0 15px;
      outline: none;
    }

    #send-btn {
      padding: 12px 25px;
      font-size: 16px;
      background-color: #FFD166;
      color: #333333;
      border: 3px solid #333333;
      border-left: none;
      border-radius: 0 15px 15px 0;
      cursor: pointer;
      font-weight: bold;
      margin: 0;
      box-shadow: none;
    }

    .btn-back {
      padding: 6px 15px;
      font-size: 14px;
      background-color: #FF477E;
      box-shadow: 0px 4px 0px #333333;
      border-radius: 20px;
      margin: 0;
    }
  </style>
</head>
<body>

<h1 id="game-title">ゆるろん</h1>

<div id="user-badge">プレイヤー: 読み込み中...</div>

<div id="menu-screen">
  <div class="btn-container">
    <button onclick="sendRequest('match')">MATCH</button>
    <button class="btn-ranking" onclick="sendRequest('ranking')">RANKING</button>
  </div>
  
  <div id="response-area">
    <span id="display-box">STATUS : <span id="status-text" style="color: #FF9F1C; background-color: #FFEEDD;">READY</span></span>
  </div>
</div>

<div id="debate-screen">
  <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 10px;">
    <div id="room-title" style="font-size: 16px; font-weight: bold; color: #FFFFFF; text-shadow: 1px 1px 2px #333333;">
      部屋名: 接続中...
    </div>
    <button class="btn-back" onclick="goBackToMenu()">戻る</button>
  </div>
  <div id="chat-box"></div>
  <div class="chat-input-container">
    <input type="text" id="message-input" placeholder="自分の意見を入力...">
    <button id="send-btn" onclick="sendMessage()">送信</button>
  </div>
</div>

<script>
  const SERVER_URL = 'https://dev-last-production.up.railway.app';
  let myRoomName = '';
  let lastMessageCount = 0; 
  let chatIntervalId = null;

  // ✨ 【新機能】一番最初にアクセスしたときにユーザーネームを聞く処理
  let myUsername = prompt('ユーザーネームを入力してください！');
  if (!myUsername || myUsername.trim() === '') {
    myUsername = '名無しさん';
  }
  // 画面の上部に名前を表示する
  document.getElementById('user-badge').innerText = `プレイヤー: ${myUsername}`;

  function sendRequest(type) {
    const displayBox = document.getElementById('display-box');
    
    if (type === 'match') {
      displayBox.innerHTML = 'STATUS : <span id="status-text" style="color: #4EA8DE; background-color: #E2F0CB;">CONNECTING...</span>';
    }

    fetch(`${SERVER_URL}/${type}`)
            .then(response => response.text())
            .then(data => {
              if (type === 'ranking') {
                displayBox.innerHTML = data;
                return;
              }

              const statusText = document.getElementById('status-text');
              if (statusText) {
                statusText.innerText = data;
              }

              if (data.startsWith('MATCHING_SUCCESS')) {
                myRoomName = data.split(': ')[1]; 

                document.getElementById('room-title').innerText = `対戦部屋: ${myRoomName}`;
                
                setTimeout(() => {
                  document.getElementById('menu-screen').style.display = 'none';
                  document.getElementById('game-title').style.display = 'none'; 
                  document.getElementById('debate-screen').style.display = 'flex';
                  
                  chatIntervalId = setInterval(updateChatLog, 1000);
                }, 1000);
              }
            });
  }

  function sendMessage() {
    const input = document.getElementById('message-input');
    const text = input.value.trim();
    if (!text || !myRoomName) return;

    fetch(`${SERVER_URL}/send-message`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        roomName: myRoomName,
        sender: myUsername, // ✨ ランダムなIDの代わりに、入力した名前を送信する！
        text: text
      })
    });

    input.value = '';
  }

  function updateChatLog() {
    if (!myRoomName) return;

    fetch(`${SERVER_URL}/get-messages?roomName=${myRoomName}`)
            .then(response => response.json())
            .then(messages => {
              if (messages.length === lastMessageCount) return;
              
              const chatBox = document.getElementById('chat-box');
              chatBox.innerHTML = ''; 

              messages.forEach(msg => {
                const rowElement = document.createElement('div');
                rowElement.classList.add('message-row');

                // 自分の名前と一致するかどうかで左右を分ける
                if (msg.sender === myUsername) {
                  rowElement.classList.add('my-message');
                } else {
                  rowElement.classList.add('other-message');
                }

                // ✨ 吹き出しの上に喋っている人の名前を表示する
                const nameElement = document.createElement('div');
                nameElement.classList.add('sender-name');
                nameElement.innerText = msg.sender;

                const bubbleElement = document.createElement('div');
                bubbleElement.classList.add('bubble');
                bubbleElement.innerText = msg.text;

                rowElement.appendChild(nameElement);
                rowElement.appendChild(bubbleElement);
                chatBox.appendChild(rowElement);
              });

              chatBox.scrollTop = chatBox.scrollHeight; 
              lastMessageCount = messages.length; 
            });
  }

  function goBackToMenu() {
    if (chatIntervalId) {
      clearInterval(chatIntervalId);
    }
    myRoomName = '';
    lastMessageCount = 0;
    document.getElementById('chat-box').innerHTML = '';

    document.getElementById('debate-screen').style.display = 'none';
    document.getElementById('game-title').style.display = 'block';
    document.getElementById('menu-screen').style.display = 'flex';
    
    document.getElementById('display-box').innerHTML = 'STATUS : <span id="status-text" style="color: #FF9F1C; background-color: #FFEEDD;">READY</span>';
  }
</script>

</body>
</html>
