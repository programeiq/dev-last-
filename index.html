<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ゆるろん</title>
  <style>
    /* 全体をポップなスカイブルーに */
    body {
      background-color: #00A2FF;
      color: #333333;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    /* PC大画面用のメインコンテナ */
    #menu-screen {
      position: relative;
      width: 90%;
      max-width: 1000px;
      height: 550px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
      padding: 20px;
    }

    /* 左上のユーザー情報エリア */
    #user-profile-area {
      position: absolute;
      top: 10px;
      left: 10px;
      display: flex;
      align-items: center;
      gap: 15px;
      background: rgba(255, 255, 255, 0.2);
      padding: 10px 20px;
      border-radius: 50px;
      border: 2px solid #FFFFFF;
      color: #FFFFFF;
    }

    /* 丸型のアイコン枠 */
    #user-icon-slot {
      width: 60px;
      height: 60px;
      background-color: #FFFFFF;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: transform 0.1s;
      border: 2px solid #FFFFFF;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }
    #user-icon-slot:hover { transform: scale(1.05); }
    #custom-icon-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    #fallback-text { font-size: 11px; font-weight: bold; color: #00A2FF; text-align: center; line-height: 1.2; }
    #icon-file-input { display: none; }

    #user-info-text {
      display: flex;
      flex-direction: column;
    }
    #game-title { font-size: 22px; font-weight: bold; margin: 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
    #user-badge { font-size: 13px; font-weight: bold; opacity: 0.9; }
    #icon-item-label { font-size: 11px; background: #FFFFFF; color: #00A2FF; padding: 2px 8px; border-radius: 10px; font-weight: bold; margin-top: 4px; width: fit-content; cursor: pointer; }

    /* 右側のメニューボタン群 */
    .right-menu-container {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 10;
    }

    .side-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 3px solid #FFFFFF;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.1s ease;
      box-shadow: 0 4px 6px rgba(0,0,0,0.15);
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .side-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 8px rgba(0,0,0,0.2); }

    .btn-settings { background-color: #FF7675; color: white; }
    .btn-ranking { background-color: #FFF385; color: #333333; border-color: #333333; }
    .btn-rule { background-color: #A29BFE; color: white; }

    /* 中央の巨大な「VS」ロゴ */
    #vs-logo-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 40px;
    }

    .vs-bubble {
      position: relative;
      width: 180px;
      height: 180px;
      background: #FFFFFF;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 70px;
      font-weight: 900;
      color: #00A2FF;
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }

    #display-box {
      background: rgba(255, 255, 255, 0.9);
      border: 2px solid #FFFFFF;
      border-radius: 15px;
      padding: 15px 30px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      white-space: pre-wrap;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      width: 60%;
      margin-bottom: 20px;
    }

    .bottom-btn-container {
      width: 80%;
      max-width: 600px;
      margin-bottom: 10px;
    }

    .btn-play {
      width: 100%;
      background-color: #FFFFFF;
      color: #00A2FF;
      border: 4px solid #FFFFFF;
      padding: 18px 0;
      font-size: 26px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 20px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
      transition: all 0.2s ease;
    }
    .btn-play:hover { background-color: #F0F8FF; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }


    /* --- VSマッチング演出画面（グレーベース） --- */
    #vs-match-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      background-color: #00A2FF;
    }

    .vs-match-box {
      background-color: #A0A0A0;
      border: 6px solid #FFFFFF;
      border-radius: 20px;
      width: 90%;
      max-width: 800px;
      padding: 40px 20px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      box-shadow: 0 15px 30px rgba(0,0,0,0.3);
      position: relative;
      box-sizing: border-box;
    }

    #match-countdown-banner {
      position: absolute;
      top: -60px;
      background-color: #FF7675;
      color: white;
      padding: 10px 30px;
      border-radius: 30px;
      font-size: 22px;
      font-weight: bold;
      border: 3px solid #FFFFFF;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      white-space: nowrap;
    }

    .match-player-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 40%;
    }

    .match-icon-container {
      width: 200px;
      height: 200px;
      background-color: #8B5A2B;
      border: 4px solid #FFFFFF;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .match-icon-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .match-icon-fallback {
      color: #FFFFFF;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
    }

    .match-info-bar {
      width: 100%;
      background-color: #3A3A3A;
      color: #FFFFFF;
      text-align: center;
      padding: 12px 5px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 5px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .match-center-vs {
      font-size: 60px;
      font-weight: 900;
      color: #FFF385;
      text-shadow: 4px 4px 0px #333;
      font-style: italic;
    }


    /* --- バトル画面 --- */
    #debate-screen {
      display: none; flex-direction: column; align-items: center; width: 95%; max-width: 700px;
      height: 85vh; border: 4px solid #FFFFFF; border-radius: 25px; background-color: #54A0FF; padding: 20px; box-shadow: 0 12px 24px rgba(0,0,0,0.15); box-sizing: border-box;
    }

    #theme-info { width: 100%; background-color: #FF7675; border: 3px solid #FFFFFF; border-radius: 15px; padding: 12px; text-align: center; color: white; font-weight: bold; margin-bottom: 10px; box-sizing: border-box; }
    
    #timer-panel { width: 100%; display: flex; justify-content: space-between; margin-bottom: 10px; gap: 10px; }
    .time-sub-box { flex: 1; text-align: center; font-size: 14px; font-weight: bold; padding: 8px; border-radius: 10px; border: 2px solid #FFFFFF; }
    #game-timer-box { background-color: #FFEAA7; color: #333333; }
    #response-timer-box { background-color: #FF7675; color: white; }

    #hp-container { width: 100%; background-color: rgba(0,0,0,0.2); border: 2px solid #FFFFFF; border-radius: 15px; padding: 12px; margin-bottom: 15px; box-sizing: border-box; color: white; font-size: 14px; font-weight: bold; }
    .hp-bar-bg { width: 100%; background-color: #FFF; height: 18px; border-radius: 9px; overflow: hidden; margin-top: 5px; }
    .hp-bar-fill { height: 100%; background-color: #1DD1A1; width: 100%; transition: width 0.3s ease; }

    #chat-box { width: 100%; flex-grow: 1; overflow-y: auto; margin-bottom: 15px; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; background: rgba(255,255,255,0.9); border-radius: 20px; }
    .message-row { display: flex; flex-direction: column; width: 100%; margin: 6px 0; }
    .my-message { align-items: flex-end; }
    .other-message { align-items: flex-start; }
    .sender-name { font-size: 12px; color: #333333; font-weight: bold; margin-bottom: 2px; }

    .bubble { max-width: 75%; padding: 12px 18px; border-radius: 18px; font-size: 16px; font-weight: bold; line-height: 1.4; word-wrap: break-word; }
    .my-message .bubble { background-color: #1DD1A1; color: white; border-radius: 18px 18px 0px 18px; }
    .other-message .bubble { background-color: #DFE4EA; color: #333333; border-radius: 18px 18px 18px 0px; }
    
    .chat-input-container { display: flex; width: 100%; gap: 10px; }
    #message-input { flex-grow: 1; padding: 15px; font-size: 16px; border: 3px solid #FFFFFF; border-radius: 15px; outline: none; }
    #send-btn { padding: 15px 30px; font-size: 16px; background-color: #FFD166; color: #333333; border: 3px solid #FFFFFF; border-radius: 15px; cursor: pointer; font-weight: bold; }
    .btn-back { padding: 8px 18px; font-size: 14px; background-color: #FF7675; border-radius: 20px; border: 2px solid #FFFFFF; color: white; font-weight: bold; cursor: pointer;}
  </style>
</head>
<body>

<div id="menu-screen">
  <!-- 左上：ユーザープロフィールエリア -->
  <div id="user-profile-area">
    <div id="user-icon-slot" onclick="triggerImageUpload()" title="クリックして写真をアップロード！">
      <img id="custom-icon-img" style="display:none;">
      <span id="fallback-text">写真<br>UP</span>
    </div>
    <input type="file" id="icon-file-input" accept="image/*" onchange="handleImageUpload(event)">

    <div id="user-info-text">
      <h1 id="game-title">ゆるろん</h1>
      <div id="user-badge">プレイヤー: 読み込み中...</div>
      <div id="icon-item-label" onclick="openItemBox()" title="称号アイテムを変更する">初心者</div>
    </div>
  </div>

  <!-- 右側：メニューボタン -->
  <div class="right-menu-container">
    <button class="side-btn btn-settings" onclick="changeName()" title="名前を変更する">SET</button>
    <button class="side-btn btn-ranking" onclick="sendRequest('ranking')">RANK</button>
    <button class="side-btn btn-rule" onclick="showRule()">RULE</button>
  </div>

  <!-- 中央：VSロゴ -->
  <div id="vs-logo-container">
    <div class="vs-bubble">VS</div>
  </div>
  
  <!-- 下部：通知ボックス -->
  <div id="display-box">STATUS : READY</div>

  <!-- 最下部：PLAYボタン -->
  <div class="bottom-btn-container">
    <button class="btn-play" onclick="startMatching()">PLAY</button>
  </div>
</div>


<!-- VSマッチング演出画面 -->
<div id="vs-match-screen">
  <div class="vs-match-box">
    <div id="match-countdown-banner">相手が来るまで、お待ちください...</div>

    <!-- 左側：あなた -->
    <div class="match-player-slot">
      <div class="match-icon-container" id="match-my-icon-slot"></div>
      <div class="match-info-bar" id="match-my-info-bar">Lv.1 あなた</div>
    </div>

    <!-- 中央のVS文字 -->
    <div class="match-center-vs">VS</div>

    <!-- 右側：対戦相手 -->
    <div class="match-player-slot">
      <div class="match-icon-container" id="match-enemy-icon-slot">
        <span class="match-icon-fallback">WAITING...</span>
      </div>
      <div class="match-info-bar" id="match-enemy-info-bar">相手を待っています</div>
    </div>
  </div>
</div>


<!-- バトル画面 -->
<div id="debate-screen">
  <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 10px;">
    <div id="room-title" style="font-size: 14px; font-weight: bold; color: #FFFFFF;">部屋名: 接続中...</div>
    <button class="btn-back" onclick="goBackToMenu()">戻る</button>
  </div>

  <div id="theme-info">
    <div id="current-theme" style="font-size: 18px;">お題: 読み込み中...</div>
  </div>

  <div id="timer-panel">
    <div id="game-timer-box" class="time-sub-box">試合残り: 180秒</div>
    <div id="response-timer-box" class="time-sub-box">入力停止中(安全)</div>
  </div>

  <div id="hp-container">
    <div style="display: flex; justify-content: space-between;">
      <div style="width: 46%;">
        <div id="my-hp-label">あなた: 2000</div>
        <div class="hp-bar-bg"><div id="my-hp-bar" class="hp-bar-fill"></div></div>
      </div>
      <div style="font-size: 16px; display: flex; align-items: center; color: #FFF385;">VS</div>
      <div style="width: 46%; text-align: right;">
        <div id="enemy-hp-label">相手: 読み込み中...</div>
        <div class="hp-bar-bg"><div id="enemy-hp-bar" class="hp-bar-fill"></div></div>
      </div>
    </div>
  </div>

  <div id="chat-box"></div>
  <div class="chat-input-container">
    <input type="text" id="message-input" placeholder="自分の意見を入力...">
    <button id="send-btn" onclick="sendMessage()">送信</button>
  </div>
</div>

<script>
  const SERVER_URL = 'https://dev-last-production.up.railway.app';
  
  let myRoomName = '';
  let lastMessageCount = 0; 
  let chatIntervalId = null;
  let timerIntervalId = null; 
  let responseMeasureIntervalId = null; 
  let matchPollIntervalId = null; 
  let remainingTime = 180; 
  let isGameOverFlag = false;
  let hasTriggeredCountdown = false;

  let elapsedSecondsBeforeType = 0; 
  let hasStartedTypingThisTurn = true; 
  let lastMyHP = 2000;
  let lastEnemyHP = 2000; // タイムアップ時の判定用に相手の最新HPを記憶

  let myUsername = localStorage.getItem('yururon_username') || '';
  let myLevel = parseInt(localStorage.getItem('yururon_level')) || 1;
  let myExp = parseInt(localStorage.getItem('yururon_exp')) || 0;
  let currentLabel = localStorage.getItem('yururon_label') || 'ゆるろん初心者';

  const itemsList = [
    { lv: 1, label: 'ゆるろん初心者' },
    { lv: 10, label: '口喧嘩 of ヒヨコ' },
    { lv: 30, label: '論破 of ニワトリ' },
    { lv: 50, label: '弁論大会 of 覇者' },
    { lv: 80, label: '論理 of 絶対神' },
    { lv: 100, label: '伝説 of ディベーター' }
  ];

  if (!myUsername) {
    myUsername = prompt('ユーザーネームを入力してください！') || '名無しさん';
    localStorage.setItem('yururon_username', myUsername);
  }
  
  function triggerImageUpload() {
    document.getElementById('icon-file-input').click();
  }

  function handleImageUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    if (file.size > 2 * 1024 * 1024) {
      alert("画像サイズが大きすぎます！2MB以下の写真を選んでね。");
      return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
      const base64Image = e.target.result;
      try {
        localStorage.setItem('yururon_user_icon', base64Image);
        loadUserIcon();
        document.getElementById('display-box').innerText = "お気に入りの写真をアイコンに設定したよ！📸";
      } catch (error) {
        alert("画像データが大きすぎます。別の写真で試ね！");
      }
    };
    reader.readAsDataURL(file);
  }

  function loadUserIcon() {
    const savedIcon = localStorage.getItem('yururon_user_icon');
    const imgTag = document.getElementById('custom-icon-img');
    const fallbackText = document.getElementById('fallback-text');

    if (savedIcon) {
      imgTag.src = savedIcon;
      imgTag.style.display = 'block';
      fallbackText.style.display = 'none';
    } else {
      imgTag.style.display = 'none';
      fallbackText.style.display = 'block';
    }
  }

  function updateUserDataDisplay() {
    let lvText = myLevel >= 100 ? "MAX" : `Lv.${myLevel}`;
    let expText = myLevel >= 100 ? "MAX" : `EXP: ${myExp}/100`;
    document.getElementById('user-badge').innerText = `${myUsername} [${lvText} (${expText})]`;
    document.getElementById('icon-item-label').innerText = currentLabel;
    loadUserIcon();
  }
  updateUserDataDisplay();

  function changeName() {
    let newName = prompt('新しいユーザーネームを入力してください：', myUsername);
    if (newName && newName.trim() !== '') {
      myUsername = newName;
      localStorage.setItem('yururon_username', myUsername);
      updateUserDataDisplay();
    }
  }

  function openItemBox() {
    let message = "称号変更\n番号を入力してね！\n\n";
    itemsList.forEach((item, index) => {
      const isUnlocked = myLevel >= item.lv;
      message += `${index + 1}: [${isUnlocked ? '解放済' : 'Lv.' + item.lv + 'で解放'}] ${item.label}\n`;
    });
    let choice = prompt(message);
    let idx = parseInt(choice) - 1;
    if (idx >= 0 && idx < itemsList.length) {
      if (myLevel >= itemsList[idx].lv) {
        currentLabel = itemsList[idx].label;
        localStorage.setItem('yururon_label', currentLabel);
        updateUserDataDisplay();
      } else {
        alert("レベルが足りません！");
      }
    }
  }

  function addExperience(amount) {
    if (myLevel >= 100) return;
    myExp += amount;
    while (myExp >= 100 && myLevel < 100) {
      myExp -= 100;
      myLevel++;
    }
    localStorage.setItem('yururon_level', myLevel);
    localStorage.setItem('yururon_exp', myExp);
    updateUserDataDisplay();
  }

  function showRule() {
    document.getElementById('display-box').innerHTML = `1秒ごとにHPが1ずつ減少！3分経った時点でHPが【少ないほうが負け】！終わったら【強制退出】！`;
  }

  function startMatching() {
    hasTriggeredCountdown = false;

    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('vs-match-screen').style.display = 'flex';

    const mySavedIcon = localStorage.getItem('yururon_user_icon');
    const myIconSlot = document.getElementById('match-my-icon-slot');
    if (mySavedIcon) {
      myIconSlot.innerHTML = `<img src="${mySavedIcon}">`;
    } else {
      myIconSlot.innerHTML = `<span class="match-icon-fallback">NO IMAGE</span>`;
    }
    let myLvText = myLevel >= 100 ? "MAX" : `Lv.${myLevel}`;
    document.getElementById('match-my-info-bar').innerText = `${myLvText} ${myUsername}`;

    document.getElementById('match-countdown-banner').innerText = `相手が来るまで、お待ちください...`;
    document.getElementById('match-enemy-icon-slot').innerHTML = `<span class="match-icon-fallback">WAITING...</span>`;
    document.getElementById('match-enemy-info-bar').innerText = `相手を待っています`;

    pollMatch();
    matchPollIntervalId = setInterval(pollMatch, 1500);
  }

  function pollMatch() {
    let lvText = myLevel >= 100 ? "MAX" : `Lv.${myLevel}`;
    let fullProfileName = `${myUsername} [${lvText} (${currentLabel})]`;

    fetch(`${SERVER_URL}/match?username=${encodeURIComponent(fullProfileName)}`)
      .then(response => response.text())
      .then(data => {
        if (data.startsWith('MATCHING_SUCCESS')) {
          clearInterval(matchPollIntervalId); 
          
          if (hasTriggeredCountdown) return; 
          hasTriggeredCountdown = true;

          const parts = data.split(' | ');
          myRoomName = parts[1].split(': ')[1]; 
          const currentTheme = parts[2]; 

          runVSMatchCountdown(currentTheme);
        }
      })
      .catch(err => {
        console.error("通信エラー:", err);
      });
  }

  function runVSMatchCountdown(currentTheme) {
    document.getElementById('match-enemy-icon-slot').innerHTML = `<span class="match-icon-fallback">READY!</span>`;
    document.getElementById('match-enemy-info-bar').innerText = `MATCHED PLAYER`;

    let countdownValue = 5;
    document.getElementById('match-countdown-banner').innerText = `試合開始まで あと ${countdownValue} 秒...`;

    let countdownInterval = setInterval(() => {
      countdownValue--;
      if (countdownValue <= 0) {
        clearInterval(countdownInterval);
        
        document.getElementById('vs-match-screen').style.display = 'none';
        document.getElementById('debate-screen').style.display = 'flex';

        document.getElementById('room-title').innerText = `対戦部屋: ${myRoomName}`;
        document.getElementById('current-theme').innerText = `お題：${currentTheme}`;
        document.getElementById('my-hp-label').innerText = `${myUsername}: 2000`;
        document.getElementById('my-hp-bar').style.width = '100%';
        document.getElementById('enemy-hp-bar').style.width = '100%';
        isGameOverFlag = false;
        lastMyHP = 2000;
        lastEnemyHP = 2000;
        hasStartedTypingThisTurn = false; 
        elapsedSecondsBeforeType = 0;

        chatIntervalId = setInterval(updateChatLog, 1000);
        startTimer(); 
        startResponseTimer();
      } else {
        document.getElementById('match-countdown-banner').innerText = `試合開始まで あと ${countdownValue} 秒...`;
      }
    }, 1000);
  }

  function startTimer() {
    remainingTime = 180; 
    document.getElementById('game-timer-box').innerText = `試合残り: ${remainingTime}秒`;
    document.getElementById('message-input').disabled = false;
    document.getElementById('send-btn').disabled = false;

    timerIntervalId = setInterval(() => {
      if (isGameOverFlag) return;
      remainingTime--;
      if (remainingTime <= 0) {
        // ⚖️ タイムアップ！HPが少ないほうが負けルール発動！
        if (lastMyHP > lastEnemyHP) {
          endGame(`タイムアップ！判定勝ち！（あなた:${lastMyHP} VS 相手:${lastEnemyHP}）`, 50);
        } else if (lastMyHP < lastEnemyHP) {
          endGame(`タイムアップ！判定負け...（あなた:${lastMyHP} VS 相手:${lastEnemyHP}）`, 20);
        } else {
          endGame(`タイムアップ！引き分け！（同点:${lastMyHP}）`, 20);
        }
      } else {
        document.getElementById('game-timer-box').innerText = `試合残り: ${remainingTime}秒`;
      }
    }, 1000);
  }

  function startResponseTimer() {
    const inputField = document.getElementById('message-input');
    const responseBox = document.getElementById('response-timer-box');

    inputField.oninput = () => {
      if (!hasStartedTypingThisTurn && inputField.value.length > 0) {
        hasStartedTypingThisTurn = true; 
        
        let penaltyDamage = elapsedSecondsBeforeType * 2; 
        
        if (penaltyDamage > 0) {
          lastMyHP = Math.max(0, lastMyHP - penaltyDamage);
          responseBox.innerText = `初速遅れで -${penaltyDamage} ダメージ！(安全モード)`;
          responseBox.style.backgroundColor = "#2ECC71";

          let lvText = myLevel >= 100 ? "MAX" : `Lv.${myLevel}`;
          let fullProfileName = `${myUsername} [${lvText} (${currentLabel})]`;

          fetch(`${SERVER_URL}/send-message`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ roomName: myRoomName, sender: fullProfileName, text: "", penaltyDamage: penaltyDamage })
          });
        } else {
          responseBox.innerText = `ナイス初速！(安全モード)`;
          responseBox.style.backgroundColor = "#2ECC71";
        }
      }
    };

    responseMeasureIntervalId = setInterval(() => {
      if (isGameOverFlag) return;
      
      if (!hasStartedTypingThisTurn) {
        elapsedSecondsBeforeType++;
        lastMyHP = Math.max(0, lastMyHP - 1);
        
        responseBox.innerText = `入力待機中... 経過: ${elapsedSecondsBeforeType}秒 (-1HP/秒)`;
        responseBox.style.backgroundColor = "#E17055";

        let myHPPercent = (lastMyHP / 2000) * 100;
        document.getElementById('my-hp-label').innerText = `${myUsername}: ${lastMyHP}/2000`;
        document.getElementById('my-hp-bar').style.width = `${myHPPercent}%`;

        let lvText = myLevel >= 100 ? "MAX" : `Lv.${myLevel}`;
        let fullProfileName = `${myUsername} [${lvText} (${currentLabel})]`;
        fetch(`${SERVER_URL}/send-message`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ roomName: myRoomName, sender: fullProfileName, text: "", penaltyDamage: 1 })
        });

        if (lastMyHP <= 0) {
          endGame(`敗北しました...（HPが尽き果てた）`, 20);
        }
      }
    }, 1000);
  }

  function sendMessage() {
    const input = document.getElementById('message-input');
    const text = input.value.trim();
    if (!text || !myRoomName || remainingTime <= 0 || isGameOverFlag) return; 

    hasStartedTypingThisTurn = false; 
    elapsedSecondsBeforeType = 0;
    document.getElementById('response-timer-box').innerText = `次の入力を早く始めろ！`;
    document.getElementById('response-timer-box').style.backgroundColor = "#E17055";

    let lvText = myLevel >= 100 ? "MAX" : `Lv.${myLevel}`;
    let fullProfileName = `${myUsername} [${lvText} (${currentLabel})]`;

    fetch(`${SERVER_URL}/send-message`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ roomName: myRoomName, sender: fullProfileName, text: text })
    });
    input.value = '';
  }

  function updateChatLog() {
    if (!myRoomName) return;
    fetch(`${SERVER_URL}/get-messages?roomName=${myRoomName}`)
      .then(response => response.json())
      .then(data => {
        const messages = data.messages || [];
        const hpData = data.hpData || {};

        let myHP = 2000;
        let enemyHP = 2000;
        let enemyFullNameDisplay = "相手";
        let cleanMyName = myUsername.trim();

        Object.keys(hpData).forEach(player => {
          let currentRawHP = hpData[player];
          let actualHP = currentRawHP <= 100 ? currentRawHP * 20 : currentRawHP;

          if (player === myUsername || player.startsWith(myUsername + " [") || player.trim().startsWith(cleanMyName)) { 
            myHP = actualHP; 
            if (lastMyHP < myHP) { myHP = lastMyHP; } else { lastMyHP = myHP; }
          } else { 
            enemyFullNameDisplay = player; 
            enemyHP = actualHP; 
            lastEnemyHP = enemyHP; // 相手のHPをグローバル変数に退避
          }
        });

        document.getElementById('enemy-hp-label').innerText = `${enemyFullNameDisplay}: ${enemyHP}/2000`;

        let myHPPercent = (myHP / 2000) * 100;
        let enemyHPPercent = (enemyHP / 2000) * 100;

        document.getElementById('my-hp-label').innerText = `${myUsername}: ${myHP}/2000`;
        document.getElementById('my-hp-bar').style.width = `${myHPPercent}%`;
        document.getElementById('enemy-hp-bar').style.width = `${enemyHPPercent}%`;

        if (!isGameOverFlag) {
          if (myHP <= 0 && enemyHP <= 0) { endGame("相打ち！", 20); } 
          else if (myHP <= 0) { endGame(`敗北しました...`, 20); } 
          else if (enemyHP <= 0) { endGame(`あなたの勝ち！`, 50); } 
        }

        if (messages.length === lastMessageCount) return;
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML = ''; 

        messages.forEach(msg => {
          if (!msg.text || msg.text === "") return; 
          const rowElement = document.createElement('div');
          rowElement.classList.add('message-row');
          
          if (msg.sender === myUsername || msg.sender.startsWith(myUsername + " [") || msg.sender.trim().startsWith(cleanMyName)) { 
            rowElement.classList.add('my-message'); 
          } else { 
            rowElement.classList.add('other-message'); 
          }

          const nameElement = document.createElement('div');
          nameElement.classList.add('sender-name');
          nameElement.innerText = msg.sender;

          const bubbleElement = document.createElement('div');
          bubbleElement.classList.add('bubble');
          bubbleElement.innerText = msg.text;

          rowElement.appendChild(nameElement);
          rowElement.appendChild(bubbleElement);
          chatBox.appendChild(rowElement);
        });
        chatBox.scrollTop = chatBox.scrollHeight; 
        lastMessageCount = messages.length; 
      });
  }

  function endGame(resultMessage, expReward) {
    isGameOverFlag = true;
    clearInterval(timerIntervalId);
    clearInterval(responseMeasureIntervalId); 
    document.getElementById('message-input').disabled = true;
    document.getElementById('send-btn').disabled = true;

    fetch(`${SERVER_URL}/game-over`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ roomName: myRoomName })
    });

    localStorage.setItem('yururon_pending_exp', expReward);
    
    // 📢 結果を通知して、OKを押したら【即座にロビーへ強制退出】！
    alert(resultMessage);
    goBackToMenu();
  }

  function goBackToMenu() {
    if (chatIntervalId) clearInterval(chatIntervalId);
    if (timerIntervalId) clearInterval(timerIntervalId); 
    if (responseMeasureIntervalId) clearInterval(responseMeasureIntervalId); 
    if (matchPollIntervalId) clearInterval(matchPollIntervalId);
    myRoomName = '';
    lastMessageCount = 0;
    document.getElementById('chat-box').innerHTML = '';
    document.getElementById('debate-screen').style.display = 'none';
    document.getElementById('vs-match-screen').style.display = 'none';
    document.getElementById('menu-screen').style.display = 'flex';
    document.getElementById('display-box').innerHTML = 'STATUS : READY';

    let pendingExp = localStorage.getItem('yururon_pending_exp');
    if (pendingExp) {
      addExperience(parseInt(pendingExp));
      localStorage.removeItem('yururon_pending_exp');
    }
  }

  function sendRequest(type) {
    const displayBox = document.getElementById('display-box');
    fetch(`${SERVER_URL}/${type}`)
      .then(response => response.text())
      .then(data => {
        if (type === 'ranking') displayBox.innerHTML = `ランキング\n\n${data}`;
      });
  }
</script>
