<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ゆるろん</title>
  <style>
    body {
      background-color: #FFFDEB;
      color: #333333;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    h1 {
      font-size: 42px;
      color: #FF477E;
      text-shadow: 3px 3px 0px #FFD166;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    .btn-container {
      margin: 20px;
    }

    button {
      background-color: #4EA8DE;
      color: #ffffff;
      border: 3px solid #333333;
      padding: 18px 35px;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 50px;
      margin: 0 15px;
      box-shadow: 0px 8px 0px #333333;
      transition: all 0.1s ease;
      outline: none;
    }

    button:nth-child(2) {
      background-color: #06D6A0;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0px 10px 0px #333333;
    }

    button:active {
      transform: translateY(6px);
      box-shadow: 0px 2px 0px #333333;
    }

    #response-area {
      margin-top: 20px;
      padding: 25px;
      border: 3px solid #333333;
      border-radius: 20px;
      width: 80%;
      max-width: 550px;
      min-height: 60px;
      text-align: center;
      background-color: #ffffff;
      box-shadow: 6px 6px 0px #FFD166;
      font-size: 20px;
      font-weight: bold;
    }

    #status-text {
      display: inline-block;
      padding: 5px 15px;
      border-radius: 10px;
    }

    /* ✨ 【新機能】ディベート画面のスタイル（最初は隠しておく） */
    #debate-screen {
      display: none; /* 最初は見せない */
      flex-direction: column;
      align-items: center;
      width: 90%;
      max-width: 600px;
      height: 60vh;
      border: 3px solid #333333;
      border-radius: 20px;
      background-color: #ffffff;
      padding: 20px;
      box-shadow: 6px 6px 0px #4EA8DE;
    }

    #chat-box {
      width: 100%;
      flex-grow: 1;
      border: 2px solid #333333;
      border-radius: 10px;
      background-color: #FAFAFA;
      overflow-y: auto;
      margin-bottom: 15px;
      padding: 10px;
      box-sizing: border-box;
    }

    .chat-input-container {
      display: flex;
      width: 100%;
    }

    #message-input {
      flex-grow: 1;
      padding: 10px;
      font-size: 16px;
      border: 2px solid #333333;
      border-radius: 10px 0 0 10px;
      outline: none;
    }

    #send-btn {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #FFD166;
      color: #333333;
      border: 2px solid #333333;
      border-left: none;
      border-radius: 0 10px 10px 0;
      cursor: pointer;
      font-weight: bold;
      box-shadow: none;
      margin: 0;
    }
  </style>
</head>
<body>

<h1>ゆるろん</h1>

<div id="menu-screen">
  <div class="btn-container">
    <button onclick="sendRequest('match')">MATCH</button>
    <button onclick="sendRequest('ranking')">RANKING</button>
  </div>

  <div id="response-area">
    STATUS : <span id="status-text" style="color: #FF9F1C; background-color: #FFEEDD;">READY</span>
  </div>
</div>

<div id="debate-screen">
  <div style="font-size: 18px; font-weight: bold; margin-bottom: 10px; color: #FF477E;">
    ディベート中！お互いの意見をぶつけ合おう！
  </div>
  <div id="chat-box"></div>
  <div class="chat-input-container">
    <input type="text" id="message-input" placeholder="自分の意見を入力...">
    <button id="send-btn" onclick="sendMessage()">送信</button>
  </div>
</div>

<script>
  const SERVER_URL = 'https://dev-last-production.up.railway.app';

  function sendRequest(type) {
    const statusText = document.getElementById('status-text');
    statusText.innerText = 'CONNECTING...';
    statusText.style.color = '#4EA8DE';
    statusText.style.backgroundColor = '#E2F0CB';

    fetch(`${SERVER_URL}/${type}`)
            .then(response => {
              if (!response.ok) {
                return response.text().then(errText => { throw new Error(errText); });
              }
              return response.text();
            })
            .then(data => {
              statusText.innerText = data;
              statusText.style.color = '#06D6A0';
              statusText.style.backgroundColor = '#E8F5E9';

              // ✨ マッチングが成功したら、ディベート画面へ切り替える
              if (data.startsWith('MATCHING_SUCCESS')) {
                setTimeout(() => {
                  document.getElementById('menu-screen').style.display = 'none'; // メニューを消す
                  document.getElementById('debate-screen').style.display = 'flex'; // チャット画面を出す
                }, 1000); // 1秒後に切り替え
              }
            })
            .catch(error => {
              statusText.innerText = 'ERROR: ' + error.message;
              statusText.style.color = '#FF477E';
              statusText.style.backgroundColor = '#FFEBEE';
            });
  }

  // ✨ 【新機能】メッセージを送信する処理（次のステップで中身を作ります）
  function sendMessage() {
    const input = document.getElementById('message-input');
    const text = input.value.trim();
    if (!text) return;

    // 自分の画面に表示する
    const chatBox = document.getElementById('chat-box');
    const msgElement = document.createElement('div');
    msgElement.style.margin = '5px 0';
    msgElement.innerText = 'あなた: ' + text;
    chatBox.appendChild(msgElement);

    input.value = ''; // 入力欄を空にする
    chatBox.scrollTop = chatBox.scrollHeight; // 一番下までスクロール
  }
</script>

</body>
</html>
